  />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="lv_LV" />
  <meta property="og:title" content="Lapumeistars | Kontakti" />

    property="og:description"
    content="Ja jums ir ideja vai projekts, pietiek ar dažiem teikumiem. Aprakstiet, ko jūs darāt un kādu mājaslapu jūs meklējat."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,400;6..72,600;6..72,700&display=swap"
    rel="stylesheet"
  />
  <link rel="preload" as="image" href="lapumeistars-logo.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper: #f3ede4;
      --paper-soft: #faf6f0;
      --surface: #fffdf9;
      --ink: #231c16;
      --muted: #645b52;
      --muted-soft: #8b8073;
      --line: #d5c8b9;
      --accent: #294e46;
      --accent-strong: #1a372f;
      --accent-soft: #e6eeeb;
      --warm: #8c6543;
      --shadow: 0 18px 44px rgba(45, 35, 22, 0.08);
      --danger: #a34d3d;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 96px;
    }

    body {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0)) 0 0 / 100% 180px no-repeat,
        linear-gradient(180deg, #f7f2ea 0%, #f1ebe2 100%);
      color: var(--ink);
      font-family: "Manrope", sans-serif;
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 14% 10%, rgba(41, 78, 70, 0.06), transparent 20%),
        radial-gradient(circle at 84% 12%, rgba(140, 101, 67, 0.06), transparent 16%);
      z-index: -1;
    }

    a { color: inherit; text-decoration: none; }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 30px;
      height: 76px;
      padding: 0 40px;
      background: rgba(247, 242, 234, 0.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(213, 200, 185, 0.8);
    }

    .nav-logo {
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
    }

    .nav-logo img,
    .footer-brand img {
      display: block;
      width: auto;
      max-width: 100%;
    }
